<div class="profile-container">
  <mat-card class="profile-card">
    <mat-card-header>
      <mat-card-title>Mi Perfil</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      @if (profile(); as p) {
        <p><strong>Nombres:</strong> {{ p.nombres }}</p>
        <p><strong>Apellidos:</strong> {{ p.apellidos }}</p>
        <p><strong>Alias:</strong> {{ p.alias }}</p>
        <p><strong>Usuario:</strong> {{ p.username }}</p>
        <p><strong>Fecha de nacimiento:</strong> {{ p.fechaNacimiento | date: 'longDate' }}</p>
      } @else {
        <p>Cargando perfil...</p>
      }
    </mat-card-content>

    <mat-card-actions>
      <button mat-button color="primary" routerLink="/posts">Ir a publicaciones</button>
    </mat-card-actions>
  </mat-card>
</div>
