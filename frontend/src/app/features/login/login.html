<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Iniciar sesión</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Usuario</mat-label>
        <input matInput [(ngModel)]="username" (keyup.enter)="onSubmit()" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Clave</mat-label>
        <input matInput type="password" [(ngModel)]="password" (keyup.enter)="onSubmit()" />
      </mat-form-field>

      @if (store.error()) {
        <p class="error">{{ store.error() }}</p>
      }
    </mat-card-content>

    <mat-card-actions align="end">
      @if (store.loading()) {
        <mat-spinner diameter="32"></mat-spinner>
      } @else {
        <button mat-raised-button color="primary" (click)="onSubmit()">Entrar</button>
      }
    </mat-card-actions>

    <mat-card-footer>
      <small>Prueba: wvalderrama / Password123</small>
    </mat-card-footer>
  </mat-card>
</div>
