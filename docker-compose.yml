services:
  db:
    image: postgres:17
    container_name: redperi-db
    environment:
      POSTGRES_USER: redperi
      POSTGRES_PASSWORD: redperi123
      POSTGRES_DB: redperi
    ports:
      - "5433:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redperi -d redperi"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./backend/auth-service
    container_name: redperi-auth
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/redperi
      SPRING_DATASOURCE_USERNAME: redperi
      SPRING_DATASOURCE_PASSWORD: redperi123
      JWT_SECRET: estaEsUnaClaveSecretaMuyLargaParaFirmarLosTokensJWT1234567890
    ports:
      - "8081:8081"

  posts-service:
    build: ./backend/posts-service
    container_name: redperi-posts
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/redperi
      SPRING_DATASOURCE_USERNAME: redperi
      SPRING_DATASOURCE_PASSWORD: redperi123
      JWT_SECRET: estaEsUnaClaveSecretaMuyLargaParaFirmarLosTokensJWT1234567890
    ports:
      - "8082:8082"

volumes:
  pgdata: